services:
  postgres:
    image: postgres:16
    container_name: capstone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-capstone_db}
      POSTGRES_USER: ${DB_USER:-capstone_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-capstone_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-capstone_user} -d ${DB_NAME:-capstone_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  watcher:
    image: python:3.12-slim
    container_name: capstone-watcher
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-capstone_db}
      DB_USER: ${DB_USER:-capstone_user}
      DB_PASSWORD: ${DB_PASSWORD:-capstone_pass}
      WATCH_PATH: /srv/FITSfileDropFolder
      OUTDIR: /app/outputs
    working_dir: /app
    volumes:
      - .:/app
      - ./FITSfileDropFolder:/srv/FITSfileDropFolder
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc "pip install --no-cache-dir watchdog python-dotenv scipy astropy matplotlib numpy scikit-image psycopg2-binary && python3 IncomingFileEventHandler.py --watch-path $${WATCH_PATH} --outdir $${OUTDIR}"

  webapp:
    image: python:3.12-slim
    container_name: capstone-webapp
    restart: unless-stopped
    environment:
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8000
      WEB_DEBUG: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-capstone_db}
      DB_USER: ${DB_USER:-capstone_user}
      DB_PASSWORD: ${DB_PASSWORD:-capstone_pass}
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc "pip install --no-cache-dir flask psycopg2-binary python-dotenv && python3 db/webapp.py"
    ports:
      - "8000:8000"

volumes:
  pgdata:
